name: Alpha APK

# Runs automatically on every push to main.
# Builds the alpha flavor (com.space4414.kiyo.alpha) and publishes all 5 ABI
# APKs to a rolling "alpha-latest" pre-release on the Releases page.

on:
  push:
    branches: [main]

permissions:
  contents: write   # needed to create / delete releases and tags

jobs:
  build:
    name: Build & Publish Alpha APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.6"

      - name: Build Alpha Debug APKs (all ABIs)
        run: gradle assembleAlphaDebug --no-daemon --stacktrace

      - name: Rename APKs for release
        run: |
          mkdir -p release-apks
          for f in app/build/outputs/apk/alpha/debug/*.apk; do
            case "$f" in
              *-arm64-v8a-*)   cp "$f" release-apks/Kiyo-Alpha-64bit-arm64-v8a.apk   ;;
              *-armeabi-v7a-*) cp "$f" release-apks/Kiyo-Alpha-32bit-armeabi-v7a.apk ;;
              *-x86_64-*)      cp "$f" release-apks/Kiyo-Alpha-x86_64.apk             ;;
              *-x86-*)         cp "$f" release-apks/Kiyo-Alpha-x86.apk                ;;
              *-universal-*)   cp "$f" release-apks/Kiyo-Alpha-universal.apk          ;;
            esac
          done
          echo "--- APKs to upload ---"
          ls -lh release-apks/

      - name: Delete existing alpha-latest release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete alpha-latest --yes 2>/dev/null || true
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/alpha-latest 2>/dev/null || true

      - name: Publish alpha-latest pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          gh release create alpha-latest \
            --prerelease \
            --title "Kiyo Alpha — ${SHORT_SHA} (${DATE})" \
            --notes "$(cat <<'EOF'
          ## Kiyo Alpha

          **Auto-built** from commit \`${GITHUB_SHA}\` · $DATE

          ### Install
          Package ID: \`com.space4414.kiyo.alpha\`
          Can be installed **alongside** Kiyo Beta and Kiyo (stable).

          | APK | Target |
          |-----|--------|
          | Kiyo-Alpha-64bit-arm64-v8a.apk  | Modern Android phones (recommended) |
          | Kiyo-Alpha-32bit-armeabi-v7a.apk | Older/32-bit ARM devices (Android 7+) |
          | Kiyo-Alpha-x86_64.apk            | 64-bit x86 emulators |
          | Kiyo-Alpha-x86.apk               | 32-bit x86 emulators |
          | Kiyo-Alpha-universal.apk         | All architectures (largest file) |
          EOF
          )" \
            --target "$GITHUB_SHA" \
            release-apks/*.apk
