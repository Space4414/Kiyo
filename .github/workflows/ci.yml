name: CI — Compile Check

# Runs on pull requests only.
# Push to main is handled by the Alpha APK workflow which both compiles
# and publishes the rolling alpha-latest release.

on:
  pull_request:
    branches: [main]

jobs:
  compile:
    name: Compile Alpha Debug (fast check)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.6"

      - name: Compile Alpha Debug
        run: gradle compileAlphaDebugKotlin --no-daemon --stacktrace
