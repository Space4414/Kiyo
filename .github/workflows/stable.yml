name: Stable APK

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag  (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Changelog / release notes (Markdown supported)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish Stable APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          TAG="${{ github.event.inputs.version_tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "::error::Tag must match v<major>.<minor>.<patch> (got: $TAG)"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.6"

      # Decode the PKCS12 keystore from the base64 secret and write it to disk.
      # The path is passed to Gradle via SIGNING_KEYSTORE_PATH env var.
      - name: Decode release keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "${{ github.workspace }}/keystore.p12"
          echo "Keystore written: $(wc -c < "${{ github.workspace }}/keystore.p12") bytes"

      - name: Build Stable Release APKs (all ABIs, R8 minified, release-signed)
        run: gradle assembleStableRelease --no-daemon --stacktrace
        env:
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/keystore.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APKs for release
        run: |
          mkdir -p release-apks
          TAG="${{ github.event.inputs.version_tag }}"
          for f in app/build/outputs/apk/stable/release/*.apk; do
            case "$f" in
              *-arm64-v8a-*)   cp "$f" "release-apks/Kiyo-64bit-arm64-v8a-${TAG}.apk"   ;;
              *-armeabi-v7a-*) cp "$f" "release-apks/Kiyo-32bit-armeabi-v7a-${TAG}.apk" ;;
              *-x86_64-*)      cp "$f" "release-apks/Kiyo-x86_64-${TAG}.apk"             ;;
              *-x86-*)         cp "$f" "release-apks/Kiyo-x86-${TAG}.apk"                ;;
              *-universal-*)   cp "$f" "release-apks/Kiyo-universal-${TAG}.apk"          ;;
            esac
          done
          echo "--- APKs to upload ---"
          ls -lh release-apks/

      - name: Publish stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.version_tag }}"
          EXTRA_NOTES="${{ github.event.inputs.release_notes }}"
          DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

          NOTES="## Kiyo ${TAG}

          Built from commit \`${GITHUB_SHA}\` · ${DATE}

          ### Install
          Package ID: \`com.space4414.kiyo\`
          Can be installed **alongside** Kiyo Alpha and Kiyo Beta.

          | APK | Target |
          |-----|--------|
          | Kiyo-64bit-arm64-v8a-${TAG}.apk  | Modern Android phones (recommended) |
          | Kiyo-32bit-armeabi-v7a-${TAG}.apk | Older/32-bit ARM devices (Android 7+) |
          | Kiyo-x86_64-${TAG}.apk            | 64-bit x86 emulators |
          | Kiyo-x86-${TAG}.apk               | 32-bit x86 emulators |
          | Kiyo-universal-${TAG}.apk         | All architectures (largest file) |

          > **Build type:** R8-minified release, signed with the **production keystore** (not the debug keystore). Ready for direct install and Play Store submission."

          if [ -n "$EXTRA_NOTES" ]; then
            NOTES="${NOTES}

          ### What's Changed
          ${EXTRA_NOTES}"
          fi

          gh release create "$TAG" \
            --title "Kiyo ${TAG}" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA" \
            release-apks/*.apk
